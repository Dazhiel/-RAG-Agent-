services:

  postgres:
    image: paradedb/paradedb:latest
    container_name: rag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: rag_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

